# filepath: docker-compose.yml
version: "3.8"

services:
  # Backend API (FastAPI)
  api:
    build:
      context: .
      dockerfile: travel_api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - DESTINATION_PHONE_NUMBER=${DESTINATION_PHONE_NUMBER}
      - CORS_ORIGINS=http://localhost:3000,https://your-production-domain.com
    volumes:
      - ./data:/app/data
      - ./chroma_db_v2:/app/chroma_db_v2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  # MongoDB (optional - use Atlas for production)
  # comment out if using MongoDB Atlas
  # mongodb:
  #   image: mongo:7
  #   ports:
  #     - "27017:27017"
  #   environment:
  #     - MONGO_INITDB_DATABASE=dandeli_travel
  #   volumes:
  #     - mongodb_data:/data/db
  #   restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

# Networks for inter-service communication
networks:
  default:
    name: dandeli-network
